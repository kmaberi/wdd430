<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>React Todo List</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, Arial, sans-serif; }
      main { max-width: 680px; margin: 40px auto; padding: 0 20px; }
      h1 { margin: 0 0 16px; font-size: 28px; }
      form { display: flex; gap: 8px; margin: 16px 0; }
      input[type="text"] { flex: 1; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; }
      button { padding: 10px 14px; border: 1px solid #888; border-radius: 8px; background: transparent; cursor: pointer; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 8px; }
      .left { display: flex; align-items: center; gap: 10px; }
      .title { overflow-wrap: anywhere; }
      .muted { opacity: 0.7; font-size: 14px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="env,react" src="./app.jsx"></script>
  </body>
  </html>
